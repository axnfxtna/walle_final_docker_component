version: "3.9"

services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    network_mode: "host"
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://localhost:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: [ "CMD", "etcdctl", "endpoint", "health" ]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    network_mode: "host"
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - ./volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9003" --address ":9002"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9002/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus:
    stop_signal: SIGTERM
    stop_grace_period: 90s
    image: milvusdb/milvus:v2.4.3
    container_name: milvus
    network_mode: "host"
    environment:
      ETCD_ENDPOINTS: localhost:2379
      MINIO_ADDRESS: localhost:9002
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: [ "milvus", "run", "standalone" ]
    depends_on:
      etcd:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - milvus_data:/var/lib/milvus

  mysql:
    image: mysql:8.0
    container_name: mysql
    # network_mode: "host"
    stop_signal: SIGTERM
    stop_grace_period: 60s
    ports:
      - "3306:3306" # Required for your host script to see 'localhost:3306'
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: capstone
    volumes:
      - mysql_data:/var/lib/mysql

  walle-data:
    stop_signal: SIGTERM
    stop_grace_period: 120s
    image: walle-data
    restart: unless-stopped
    network_mode: "host"
    build:
      context: .
      dockerfile: Dockerfile-database
    depends_on:
      - milvus
      - mysql
    environment:
      MILVUS_HOST: localhost
      MYSQL_HOST: localhost
      CHAT_HISTORY_DIR: /app/database/chat_history
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./src:/app/src
      - ./entrypoints:/app/entrypoints
      - ./configs:/app/configs
      - ./.env:/app/.env
      - ./dataset:/app/dataset
      - ./database/chat_history:/app/database/chat_history

